# =============================================
# Spring Boot Application Configuration
# =============================================

# Application Name
spring.application.name=farming-equipment-rental-system

# =============================================
# Server Configuration
# =============================================
server.port=${PORT:8080}
server.servlet.context-path=/

# Enable GZIP Compression for faster response
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# =============================================
# Database Configuration (MongoDB)
# =============================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/agrorentdb}
spring.data.mongodb.auto-index-creation=true

# =============================================
# Razorpay Configuration (TEST MODE)
# =============================================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_your_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:rzp_test_your_key_secret}

# =============================================
# Mail Configuration (SMTP)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:agrorent649@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ytuyncctcxrsyqvc}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================
# Logging Configuration
# =============================================
logging.level.root=INFO
logging.level.com.farming.rental=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/application.log

# =============================================
# Session Configuration
# =============================================
server.servlet.session.timeout=30m

# =============================================
# Encoding
# =============================================
# spring.mandatory-file-encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# =============================================
# Error Handling
# =============================================
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
