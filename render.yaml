services:
  # Backend Web Service (Spring Boot)
  - type: web
    name: agrorent-backend
    env: java
    plan: free
    region: ohio # Change if needed, but Ohio usually has free tier availability
    buildCommand: "sh mvnw clean install -DskipTests"
    startCommand: "java -jar target/*.jar"
    rootDir: backend
    healthCheckPath: /api/auth/health # Change if you have a health endpoint
    envVars:
      - key: MONGODB_URI
        sync: false # Set this in Render dashboard (e.g., mongodb+srv://...)
      - key: ALLOWED_ORIGINS
        sync: false # Set this to your frontend URL after deployment (e.g., https://agrorent.onrender.com)
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # Frontend Static Site (React/Vite)
  - type: static
    name: agrorent-frontend
    env: static
    plan: free
    buildCommand: "npm install && npm run build"
    publishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set this to your backend service URL (e.g., https://agrorent-backend.onrender.com)
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
