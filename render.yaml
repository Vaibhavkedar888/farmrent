services:
  # Backend Web Service (Spring Boot)
  - type: web
    name: agrorent-backend
    env: java
    buildCommand: "./mvnw clean install -DskipTests"
    startCommand: "java -jar target/*.jar"
    rootDir: backend
    envVars:
      - key: MONGODB_URI
        sync: false # Set this in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false # Set this to your frontend URL after deployment
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # Frontend Static Site (React/Vite)
  - type: static
    name: agrorent-frontend
    env: static
    buildCommand: "npm install && npm run build"
    publishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set this to your backend URL after deployment
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
